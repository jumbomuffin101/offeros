services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offeros
      POSTGRES_USER: offeros
      POSTGRES_PASSWORD: offeros
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offeros -d offeros"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - offeros_postgres:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      APP_ENV: local
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://offeros:offeros@postgres:5432/offeros
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

volumes:
  offeros_postgres:
